<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>ChatBot Widget Demo — ATJF Imobiliária</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f0f0f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .demo-page {
    text-align: center;
    color: #333;
  }
  .demo-page h1 { font-size: 2rem; margin-bottom: 0.5rem; }
  .demo-page p { color: #666; }
</style>
</head>
<body>

<div class="demo-page">
  <h1>ATJF Imobiliária</h1>
  <p>Agência Imobiliária no Porto — Compra, Venda, Arrendamento</p>
  <p style="margin-top:2rem; color:#999; font-size:0.9rem;">👉 O assistente abre automaticamente após alguns segundos</p>
</div>

<!-- ═══════════════════════════════════════════════
     WIDGET — cola este bloco em qualquer site
     Muda apenas BACKEND_URL para o teu Railway URL
════════════════════════════════════════════════ -->
<script>
(function() {

  const BACKEND_URL  = "https://SEU-PROJECTO.up.railway.app";
  const COMPANY_NAME = "ATJF Imobiliária";
  const ACCENT_COLOR = "#c8a96e";
  const DARK_COLOR   = "#1a1a1a";

  // Mensagem de abertura e botões de quick reply
  const WELCOME_MESSAGE = "Olá! 👋 Bem-vindo à ATJF Imobiliária. Em que posso ajudar?";
  const QUICK_REPLIES = ["🏠 Comprar", "💶 Vender", "🔑 Arrendar", "🏢 Gerir Condomínio"];

  // Segundos até o chat abrir automaticamente (muda para 0 para desactivar)
  const AUTO_OPEN_DELAY = 6;

  // Chave para guardar conversa no browser
  const STORAGE_KEY = "atjf_chat_session";

  // ── STATE ──────────────────────────────────────
  let isOpen      = false;
  let messages    = [];
  let leadCaptured = false;

  // ── RESTORE SESSION ────────────────────────────
  function loadSession() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const data = JSON.parse(saved);
        messages      = data.messages     || [];
        leadCaptured  = data.leadCaptured || false;
        return true;
      }
    } catch(e) {}
    return false;
  }

  function saveSession() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ messages, leadCaptured }));
    } catch(e) {}
  }

  // ── STYLES ────────────────────────────────────
  const style = document.createElement("style");
  style.textContent = `
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap');

    #rn-launcher {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: ${ACCENT_COLOR};
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    #rn-launcher:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 28px rgba(0,0,0,0.3);
    }
    #rn-launcher svg { width: 26px; height: 26px; fill: white; }

    /* Badge de notificação no launcher */
    #rn-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 18px;
      height: 18px;
      background: #e53935;
      border-radius: 50%;
      border: 2px solid white;
      display: none;
    }
    #rn-badge.visible { display: block; }

    #rn-widget {
      position: fixed;
      bottom: 96px;
      right: 24px;
      width: 370px;
      height: 560px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      z-index: 9998;
      overflow: hidden;
      transform: scale(0.85) translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-family: 'DM Sans', sans-serif;
    }
    #rn-widget.open {
      transform: scale(1) translateY(0);
      opacity: 1;
      pointer-events: all;
    }

    #rn-header {
      background: ${DARK_COLOR};
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    #rn-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: ${ACCENT_COLOR};
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      flex-shrink: 0;
    }
    #rn-header-info { flex: 1; }
    #rn-header-name {
      font-family: 'Playfair Display', serif;
      color: white;
      font-size: 0.95rem;
      font-weight: 600;
      margin: 0;
    }
    #rn-header-status {
      color: ${ACCENT_COLOR};
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 2px;
    }
    #rn-header-status::before {
      content: '';
      width: 6px;
      height: 6px;
      background: #4caf50;
      border-radius: 50%;
      display: inline-block;
    }
    #rn-close {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
    }
    #rn-close:hover { color: white; }
    #rn-close svg { width: 18px; height: 18px; fill: currentColor; }

    #rn-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #fafafa;
    }
    #rn-messages::-webkit-scrollbar { width: 4px; }
    #rn-messages::-webkit-scrollbar-track { background: transparent; }
    #rn-messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    .rn-msg {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.875rem;
      line-height: 1.5;
      animation: rn-fadein 0.2s ease;
    }
    @keyframes rn-fadein {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .rn-msg.bot {
      background: white;
      color: ${DARK_COLOR};
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .rn-msg.user {
      background: ${ACCENT_COLOR};
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .rn-msg.typing {
      background: white;
      align-self: flex-start;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .rn-dots {
      display: flex;
      gap: 4px;
      padding: 2px 0;
    }
    .rn-dots span {
      width: 6px;
      height: 6px;
      background: #bbb;
      border-radius: 50%;
      animation: rn-bounce 1.2s infinite;
    }
    .rn-dots span:nth-child(2) { animation-delay: 0.2s; }
    .rn-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes rn-bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Quick Reply Buttons */
    .rn-quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-self: flex-start;
      margin-top: 4px;
      animation: rn-fadein 0.3s ease;
    }
    .rn-qr-btn {
      background: white;
      color: ${DARK_COLOR};
      border: 1.5px solid ${ACCENT_COLOR};
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 0.8rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      font-weight: 500;
    }
    .rn-qr-btn:hover {
      background: ${ACCENT_COLOR};
      color: white;
    }

    .rn-lead-badge {
      background: #e8f5e9;
      color: #2e7d32;
      font-size: 0.75rem;
      padding: 6px 12px;
      border-radius: 20px;
      align-self: center;
      text-align: center;
    }

    #rn-footer {
      padding: 12px 16px;
      background: white;
      border-top: 1px solid #f0f0f0;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    #rn-input {
      flex: 1;
      border: 1.5px solid #e8e8e8;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.875rem;
      font-family: 'DM Sans', sans-serif;
      resize: none;
      outline: none;
      max-height: 100px;
      line-height: 1.4;
      transition: border-color 0.2s;
    }
    #rn-input:focus { border-color: ${ACCENT_COLOR}; }
    #rn-input::placeholder { color: #bbb; }
    #rn-send {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: ${ACCENT_COLOR};
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }
    #rn-send:hover { background: #b8965e; transform: scale(1.05); }
    #rn-send:disabled { background: #ddd; cursor: not-allowed; transform: none; }
    #rn-send svg { width: 18px; height: 18px; fill: white; }

    #rn-powered {
      text-align: center;
      font-size: 0.68rem;
      color: #ccc;
      padding: 4px 0 8px;
      background: white;
      flex-shrink: 0;
    }

    @media (max-width: 420px) {
      #rn-widget { width: calc(100vw - 32px); right: 16px; bottom: 88px; }
    }
  `;
  document.head.appendChild(style);

  // ── HTML ──────────────────────────────────────
  const widget = document.createElement("div");
  widget.id = "rn-widget";
  widget.innerHTML = `
    <div id="rn-header">
      <div id="rn-avatar">A</div>
      <div id="rn-header-info">
        <p id="rn-header-name">${COMPANY_NAME}</p>
        <div id="rn-header-status">Online agora</div>
      </div>
      <button id="rn-close" aria-label="Fechar">
        <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
      </button>
    </div>
    <div id="rn-messages"></div>
    <div id="rn-footer">
      <textarea id="rn-input" placeholder="Escreva a sua mensagem..." rows="1"></textarea>
      <button id="rn-send" aria-label="Enviar">
        <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      </button>
    </div>
    <div id="rn-powered">Powered by AI · <a href="#" onclick="clearChat();return false;" style="color:#ccc;">Nova conversa</a></div>
  `;

  const launcher = document.createElement("button");
  launcher.id = "rn-launcher";
  launcher.setAttribute("aria-label", "Abrir chat");
  launcher.innerHTML = `
    <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    <div id="rn-badge"></div>
  `;

  document.body.appendChild(widget);
  document.body.appendChild(launcher);

  // ── HELPERS ───────────────────────────────────
  const messagesEl = document.getElementById("rn-messages");
  const inputEl    = document.getElementById("rn-input");
  const sendBtn    = document.getElementById("rn-send");
  const badge      = document.getElementById("rn-badge");

  function addMessage(text, role) {
    const div = document.createElement("div");
    div.className = `rn-msg ${role}`;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function showTyping() {
    const div = document.createElement("div");
    div.className = "rn-msg typing";
    div.id = "rn-typing";
    div.innerHTML = `<div class="rn-dots"><span></span><span></span><span></span></div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById("rn-typing");
    if (t) t.remove();
  }

  function showLeadBadge() {
    if (leadCaptured) return;
    leadCaptured = true;
    const div = document.createElement("div");
    div.className = "rn-lead-badge";
    div.textContent = "✓ Os seus dados foram recebidos. Entraremos em contacto em breve!";
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    saveSession();
  }

  // Renderiza mensagens guardadas na sessão anterior
  function renderSavedMessages() {
    messages.forEach(m => {
      if (m.role === "user") addMessage(m.content, "user");
      else if (m.role === "assistant") addMessage(m.content, "bot");
    });
    if (leadCaptured) {
      const div = document.createElement("div");
      div.className = "rn-lead-badge";
      div.textContent = "✓ Os seus dados foram recebidos. Entraremos em contacto em breve!";
      messagesEl.appendChild(div);
    }
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // Botões de quick reply (só aparecem na primeira abertura)
  function showQuickReplies() {
    const container = document.createElement("div");
    container.className = "rn-quick-replies";
    container.id = "rn-quick-replies";
    QUICK_REPLIES.forEach(label => {
      const btn = document.createElement("button");
      btn.className = "rn-qr-btn";
      btn.textContent = label;
      btn.addEventListener("click", () => {
        container.remove();
        inputEl.value = label.replace(/^[^\w]+/, "").trim(); // remove emoji
        sendMessage();
      });
      container.appendChild(btn);
    });
    messagesEl.appendChild(container);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function clearChat() {
    messages = [];
    leadCaptured = false;
    try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
    messagesEl.innerHTML = "";
    showWelcome();
  }
  window.clearChat = clearChat;

  function showWelcome() {
    addMessage(WELCOME_MESSAGE, "bot");
    messages.push({ role: "assistant", content: WELCOME_MESSAGE });
    showQuickReplies();
    saveSession();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    // Remove quick replies se ainda existirem
    const qr = document.getElementById("rn-quick-replies");
    if (qr) qr.remove();

    addMessage(text, "user");
    messages.push({ role: "user", content: text });
    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch(`${BACKEND_URL}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages }),
      });
      const data = await res.json();
      hideTyping();
      addMessage(data.message, "bot");
      messages.push({ role: "assistant", content: data.message });
      if (data.lead_captured) showLeadBadge();
      saveSession();
    } catch (e) {
      hideTyping();
      addMessage("Desculpe, ocorreu um erro. Por favor tente novamente.", "bot");
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  // ── OPEN / CLOSE ──────────────────────────────
  function openWidget() {
    if (isOpen) return;
    isOpen = true;
    widget.classList.add("open");
    badge.classList.remove("visible");

    if (messages.length === 0) {
      // Primeira vez — sem sessão guardada
      setTimeout(showWelcome, 300);
    } else if (messagesEl.children.length === 0) {
      // Há sessão guardada — renderiza
      renderSavedMessages();
    }
  }

  function closeWidget() {
    isOpen = false;
    widget.classList.remove("open");
  }

  // ── EVENTS ────────────────────────────────────
  launcher.addEventListener("click", () => {
    if (isOpen) closeWidget();
    else openWidget();
  });

  document.getElementById("rn-close").addEventListener("click", closeWidget);

  sendBtn.addEventListener("click", sendMessage);

  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + "px";
  });

  // ── INICIALIZAÇÃO ─────────────────────────────
  const hasSession = loadSession();

  // Auto-open após delay (só se não houver sessão activa aberta)
  if (AUTO_OPEN_DELAY > 0) {
    setTimeout(() => {
      if (!isOpen) {
        if (hasSession) {
          // Já tem sessão — mostra badge em vez de abrir automaticamente
          badge.classList.add("visible");
        } else {
          // Primeira visita — abre automaticamente
          openWidget();
        }
      }
    }, AUTO_OPEN_DELAY * 1000);
  }

})();
</script>
<!-- ═══════════════════════════════════════════════ -->

</body>
</html>
